name: Update Spotify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run script
        run: python scripts/spotify.py

      - name: Save changes
        run: |
          git config user.name "ChartPulse Bot"
          git config user.email "bot@chartpulse.com"
          git add data/
          git commit -m "Update Spotify data" || echo "No changes"
          git pull --rebase origin main
          git push origin main
