name: Update Spotify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python scripts/spotify.py

      - run: |
          git config user.name "ChartPulse Bot"
          git config user.email "bot@chartpulse.com"
          git add data/
          git commit -m "Update Spotify data" || exit 0
          git pull --rebase origin main
          git push origin main
